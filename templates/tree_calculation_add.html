<!doctype html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Добавление операции</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/tree.css') }}">

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/index.css') }}">

</head>

<script src="{{ url_for('static', filename='js/help.js') }}"></script>

<body data-help="tree,calculation">

    <!-- ====================================================== -->
    <!-- NAVBAR -->
    <!-- ====================================================== -->

    <nav class="navbar navbar-expand-lg navbar-light">

        <div class="container-fluid">

            <button class="navbar-toggler"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#navbarNav">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse"
                 id="navbarNav">

                <div class="row w-100">

                    <!-- Верхняя строка -->

                    <div class="col-12 d-flex justify-content-between mb-2 hat">

                        <div>

                            <button onclick="window.location.href='/operation_table'"
                                    class="btn btn-secondary">

                                Справочники

                            </button>

                            <button onclick="window.location.href='/index'"
                                    class="btn active">

                                Журнал заказов

                            </button>

                        </div>

                        <div>

                            {% if current_user.is_authenticated %}

                            <button onclick="window.location.href='/logout'"
                                    class="btn btn-danger">

                                Выход

                            </button>

                            {% else %}

                            <button onclick="window.location.href='/login'"
                                    class="btn btn-action-secondary">

                                Вход

                            </button>

                            {% endif %}

                        </div>

                    </div>

                    <!-- Меню заказа -->

                    <div class="text-left mb-4 hat">

                        <button class="btn btn-secondary"
                                onclick="window.location.href='/passport/{{ order.id_order }}'">

                            Паспорт заказа

                        </button>

                        <button class="btn active"
                                onclick="window.location.href='/tree/{{ order.id_order }}'">

                            Технологическая схема

                        </button>

                        <button class="btn btn-secondary"
                                onclick="window.location.href='/materials/{{ order.id_order }}'">

                            Материалы заказа

                        </button>

                    </div>

                </div>

            </div>

        </div>

    </nav>

    <!-- ====================================================== -->
    <!-- FLASH -->
    <!-- ====================================================== -->

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}

    <div class="mt-3">

        {% for category, message in messages %}

        <div class="alert alert-{{ category }}">

            {{ message }}

        </div>

        {% endfor %}

    </div>

    {% endif %}
    {% endwith %}

    <!-- ====================================================== -->
    <!-- ОСНОВНОЙ LAYOUT -->
    <!-- ====================================================== -->

    <div class="tree-layout">

        <!-- ====================================================== -->
        <!-- ЛЕВАЯ КАРТОЧКА -->
        <!-- ====================================================== -->

        <div class="tree-card">

            <div
                id="tree-container"
                class="tree-content
                       tree-padding
                       tree-vertical-lines
                       tree-horizontal-lines
                       tree-summaries
                       tree-markers
                       tree-buttons">

                {{ tree_html|safe }}

            </div>

        </div>

        <!-- ====================================================== -->
        <!-- ПРАВАЯ КОЛОНКА -->
        <!-- ====================================================== -->

        <div class="tree-right-column">

            <!-- ====================================================== -->
            <!-- КАРТОЧКА ДОБАВЛЕНИЯ -->
            <!-- ====================================================== -->

            <div class="control-card">

                <form method="POST"
                      action="{{ url_for('add_operation_new') }}">

                    <!-- ORDER ID -->

                    <input type="hidden"
                           name="order_id"
                           value="{{ order_id }}">

                    <!-- PARENT ID -->

                    <input type="hidden"
                           name="parent_id"
                           value="{{ parent_id }}">

                    <!-- ====================================================== -->
                    <!-- РОДИТЕЛЬСКАЯ ОПЕРАЦИЯ -->
                    <!-- ====================================================== -->

                    <div class="mb-4">

                        <div class="mb-2">

                            <strong>

                                Родительская операция:

                            </strong>

                            {{ parent_id }}

                        </div>

                    </div>

                    <!-- ====================================================== -->
                    <!-- ДОЧЕРНЯЯ ОПЕРАЦИЯ -->
                    <!-- ====================================================== -->

                    <div class="mb-4">

                        <label
                            for="operation_id"
                            class="form-label">

                            <strong>

                                Дочерняя операция:

                            </strong>

                        </label>

                        <select
                            name="operation_id"
                            id="operation_id"
                            required
                            class="form-control control-input">

                            <option value="">

                                Выбрать дочернюю операцию

                            </option>

                            {% for operation in results1 %}

                            <option value="{{ operation.id_operations }}">

                                {{ operation.id_operations }}
                                :
                                {{ operation.name_type_work }}
                                :
                                {{ operation.name_operations }}

                            </option>

                            {% endfor %}

                        </select>

                    </div>

                    <!-- ====================================================== -->
                    <!-- КНОПКА -->
                    <!-- ====================================================== -->

                    <button
                        type="submit"
                        class="btn btn-action">

                        Добавить операцию

                    </button>

                </form>

            </div>

        </div>

    </div>

    <!-- ====================================================== -->
    <!-- SCRIPT -->
    <!-- ====================================================== -->

    <script>

        document.querySelectorAll(".caret").forEach(function (caret) {

            caret.addEventListener("click", function () {

                this.parentElement
                    .querySelector(".nested")
                    .classList
                    .toggle("active");

                this.classList.toggle("caret-down");

            });

        });

    </script>

</body>

</html>
