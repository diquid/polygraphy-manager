<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дерево заказа</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/tree.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/index.css') }}">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-light">
        <div class="container-fluid">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Переключить навигацию">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="row w-100">
                    <div class="col-12 d-flex justify-content-between mb-2 hat">
                        <div>
                            <button onclick="window.location.href='/operation_table'"
                                class="btn btn-secondary">Справочники</button>
                            <button onclick="window.location.href='/index'" class="btn active">Журнал заказов</button>
                        </div>
                        <div>
                            {% if current_user.is_authenticated %}
                            <button onclick="window.location.href='/logout'" class="btn btn-danger">Выход</button>
                            {% else %}
                            <button onclick="window.location.href='/login'" class="btn btn-action-secondary">Вход</button>
                            {% endif %}
                        </div>
                    </div>
                    <div class="text-left mb-4 hat">
                        <button class="btn btn-secondary"
                            onclick="window.location.href='/passport/{{ order.id_order }}'">Паспорт заказа</button>
                        <button class="btn active"
                            onclick="window.location.href='/tree/{{ order.id_order }}'">Технологическая схема</button>
                        <button class="btn btn-secondary"
                            onclick="window.location.href='/materials/{{ order.id_order }}'">Материалы заказа</button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div class="mt-3">
        {% for category, message in messages %}
        <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
    </div>
    {% endif %}
    {% endwith %}

    <div class="tree-layout">

        <!-- Левая карточка -->
        <div class="tree-card">

            <div id="tree-container"
                class="tree-content
                tree-padding
                tree-vertical-lines
                tree-horizontal-lines
                tree-summaries
                tree-markers
                tree-buttons">

                {{ tree_html|safe }}

            </div>

        </div>

        <!-- Правая колонка -->
        <div class="tree-right-column">

            <!-- Панель управления -->
            <div class="control-card">

                <form method="POST"
                    action="{{ url_for('calculate_cost', order_id=order_id) }}"
                    class="cost-form form-group">

                    <input
                        type="number"
                        id="circulation"
                        name="circulation"
                        value="{{ circulation }}"
                        required
                        placeholder="Введите тираж"
                        class="control-input form-control">

                    <button
                        class="btn btn-action"
                        type="submit">

                        Рассчитать стоимость

                    </button>

                    <button
                        type="button"
                        class="btn btn-action-secondary"
                        onclick="window.location.href='/generate_pdf/{{ order_id }}'">

                        Сгенерировать PDF

                    </button>

                </form>

                <div class="cost-row form-group">

                    <label for="total_cost" class="cost-label">
                        Стоимость:
                    </label>

                    <input
                        type="text"
                        id="total_cost"
                        name="total_cost"
                        value="{{ total_cost | round(2)}}"
                        readonly
                        class="control-input cost-input form-control">

                </div>

            </div>

            <!-- Материалы -->
            <div class="materials-card materials-section">

                <div class="materials-header">

                    <h2>Материалы</h2>

                    <button class="add-button">
                        +
                    </button>

                </div>

                <div class="materials-content materials-table">

                    {{ html_materials|safe }}

                </div>

            </div>

        </div>

    </div>

    <script>
        document.querySelectorAll(".caret").forEach(function (caret) {
            caret.addEventListener("click", function () {
                this.parentElement.querySelector(".nested").classList.toggle("active");
                this.classList.toggle("caret-down");
            });
        });

        function showPrintingSystem() {
            window.location.href = '/index';
        }
    </script>
</body>

</html>
