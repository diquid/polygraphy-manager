<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/index.css') }}">
</head>

<script src="{{ url_for('static', filename='js/help.js') }}"></script>

<body data-help="auth">
    <div class="operation-wrapper">
        <div class="operation-card">

            <div class="operation-title">
                Вход в систему
            </div>

            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    <div class="form-field">
                        <div class="alert alert-danger">
                            {% for message in messages %}
                                <div>{{ message }}</div>
                            {% endfor %}
                        </div>
                    </div>
                {% endif %}
            {% endwith %}

            <form method="POST">
                {{ form.csrf_token }}

                <div class="form-field">
                    <label>Логин</label>
                    {{ form.name_employee(class="form-input") }}
                </div>

                <div class="form-field">
                    <label>Пароль</label>
                    {{ form.password(class="form-input") }}
                </div>

                <div class="form-btn">
                    <button type="submit" class="btn btn-action">Войти</button>
                </div>

            </form>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-xCjzZ2aF9O1pZpmB7R1eH5D2W0Pj3r9hXjXn2Tt5kE5u4F1L1xG1K4WV4c4x4X1M"
        crossorigin="anonymous">
    </script>

</body>
</html>
