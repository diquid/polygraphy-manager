<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Технологические операции</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/index.css') }}">
</head>

<script src="{{ url_for('static', filename='js/help.js') }}"></script>

<body data-help="nomenclature">
    <nav class="navbar navbar-expand-lg navbar-light">
        <div class="container-fluid">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Переключить навигацию">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="row w-100">

                    <div class="col-12 d-flex justify-content-between mb-2 hat">
                        <div>
                            <button onclick="window.location.href='/operation_table'"
                                class="btn active">Справочники</button>
                            <button onclick="window.location.href='/index'" class="btn btn-secondary">Журнал заказов</button>
                        </div>

                        <div>
                            {% if current_user.is_authenticated %}
                            <button onclick="window.location.href='/logout'" class="btn btn-danger">Выйти</button>
                            {% else %}
                            <button onclick="window.location.href='/login'" class="btn btn-action-secondary">Войти</button>
                            {% endif %}
                        </div>
                    </div>

                    <div class="col-12 d-flex justify-content-start hat">
                        <button onclick="window.location.href='/operation_table'" class="btn btn-secondary">Технологические операции</button>
                        <button onclick="window.location.href='/material_table'" class="btn btn-secondary">Материалы</button>
                        <button onclick="window.location.href='/nomenclature_orders_table'" class="btn active">Номенклатура продукции</button>
                        <button onclick="window.location.href='/employee_table'" class="btn btn-secondary">Сотрудники</button>
                        <button onclick="window.location.href='/nomenclature_parameters_table'" class="btn btn-secondary">Параметры операций</button>
                        <button onclick="window.location.href='/instructions'" class="btn btn-secondary">Инструкции</button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div class="mt-3">
        {% for category, message in messages %}
        <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
    </div>
    {% endif %}
    {% endwith %}

    <div class="operation-wrapper">
        <div class="operation-card">

            <div class="operation-title">
                Создание номенклатуры
            </div>

            <form method="POST" action="{{ url_for('new_nomenclature_orders_add') }}" enctype="multipart/form-data">

                <div class="form-field">
                    <label>Название номенклатуры</label>
                    <input type="text" name="name" required>
                </div>

                <div class="form-field">
                    <label>Изображение</label>
                    <input type="file" name="image" accept="image/*">
                    <img id="preview" style="max-width:150px; display:none; margin-top:10px;">
                </div>

                <div class="form-btn">
                    <button type="submit" class="btn btn-action">
                        Создать номенклатуру
                    </button>
                </div>

            </form>

        </div>
    </div>

    <script>
    document.querySelector('input[type="file"]').addEventListener('change', function(e) {
        const file = e.target.files[0];
        const preview = document.getElementById('preview');

        if (file) {
            preview.src = URL.createObjectURL(file);
            preview.style.display = 'block';
        }
    });
    </script>
    
</body>

</html>
